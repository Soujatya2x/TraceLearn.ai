# FILE: docker-compose.yml
# For LOCAL DEVELOPMENT only. Not used in production.
#
# Run: docker-compose up --build
#
# Key: /var/run/docker.sock is mounted so our service can create sibling containers.

version: "3.9"

services:
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: tracelearn-sandbox
    ports:
      - "8000:8000"
    volumes:
      # Mount HOST Docker socket — allows sandbox to create sibling containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount workspace volume — backend writes code here, sandbox reads from here
      - /tmp/workspace:/workspace
    environment:
      - ENVIRONMENT=development
      - WORKSPACE_ROOT=/workspace
      - AUTO_PULL_IMAGES=true
      - MAX_EXECUTION_TIME=60
      - DEFAULT_TIMEOUT_SECONDS=10
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/sandbox/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s