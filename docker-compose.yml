version: '3.9'

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tracelearn-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - SANDBOX_URL=http://sandbox:8000
      - AI_AGENT_URL=http://ai-agent:8081
      - S3_BUCKET=${S3_BUCKET_NAME}
      - AWS_REGION=${AWS_REGION}
      - CORS_ORIGINS=${FRONTEND_URL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SANDBOX_INTERNAL_SECRET=${SANDBOX_INTERNAL_SECRET}
      - WORKSPACE_ROOT=/tmp/tracelearn/workspaces
    volumes:
      - workspace-data:/tmp/tracelearn/workspaces
    networks:
      - tracelearn-network
    restart: unless-stopped
    depends_on:
      sandbox:
        condition: service_healthy
      ai-agent:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider",
             "http://localhost:8080/api/v1/health/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
      target: production
    container_name: tracelearn-sandbox
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - workspace-data:/workspace
    environment:
      - ENVIRONMENT=production
      - WORKSPACE_ROOT=/workspace
      - AUTO_PULL_IMAGES=false
      - MAX_EXECUTION_TIME=60
      - DEFAULT_TIMEOUT_SECONDS=10
      - INTERNAL_SECRET=${SANDBOX_INTERNAL_SECRET}
      - REQUIRE_INTERNAL_AUTH=true
      - DOCKER_HOST=unix:///var/run/docker.sock
    user: root
    privileged: true
    networks:
      - tracelearn-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import httpx; httpx.get('http://localhost:8000/sandbox/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  ai-agent:
    build:
      context: ./ai-agent
      dockerfile: Dockerfile
    container_name: tracelearn-ai-agent
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      - JAVA_BASE_URL=http://backend:8080
      - AWS_REGION=${AWS_REGION}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - BEDROCK_MODEL_ID=openai/gpt-oss-120b
      # No AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY needed —
      # IAM role on EC2 provides credentials automatically via metadata service
    networks:
      - tracelearn-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: tracelearn-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - tracelearn-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  workspace-data:
  redis-data:

networks:
  tracelearn-network:
    driver: bridge