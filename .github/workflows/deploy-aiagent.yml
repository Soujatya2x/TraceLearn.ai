name: Deploy AI Agent

on:
  push:
    branches: [main, master]
    paths:
      - "ai-agent/**"

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy AI agent to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ai-agent
          target: /home/ubuntu/tracelearn/

      - name: Build and restart AI agent
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/tracelearn

            echo "Stopping old AI agent..."
            docker compose stop ai-agent || true

            echo "Building AI agent..."
            docker compose build ai-agent

            echo "Starting AI agent..."
            docker compose up -d ai-agent

            echo "Waiting..."
            sleep 30

            docker ps

            docker ps | grep tracelearn-ai-agent && echo "✅ AI Agent running" || (docker compose logs ai-agent --tail=50 && exit 1)