name: Deploy Backend

on:
  push:
    branches: [master]
    paths: ['backend/**', 'docker-compose.yml']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy code to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend/,docker-compose.yml"
          target: "/home/ubuntu/tracelearn/"

      - name: Build and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/tracelearn
            docker compose build backend
            docker compose up -d backend
            sleep 20
            docker ps | grep -q tracelearn-backend && echo '✅ OK' || (docker compose logs backend --tail=50 && exit 1)