server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: tracelearn-system-brain

  # ── Database (AWS RDS PostgreSQL) ──
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 180000
      keepalive-time: 30000
      maximum-pool-size: 5
      minimum-idle: 1
      pool-name: TraceLearnPool

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 20
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # ── Security / OAuth2 ──
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: openid, profile, email
            redirect-uri: "{baseUrl}/api/v1/auth/oauth2/callback/{registrationId}"
          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}
            scope: user:email, read:user
            redirect-uri: "{baseUrl}/api/v1/auth/oauth2/callback/{registrationId}"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
            user-name-attribute: sub
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user
            user-name-attribute: id

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# ── Application Config ──
app:
  jwt:
    secret: ${JWT_SECRET:super-secret-key-that-must-be-changed-in-production-min-256-bits-long}
    expiration-ms: 86400000          # 24 hours
    refresh-expiration-ms: 604800000 # 7 days

  workspace:
    root-path: ${WORKSPACE_ROOT}   # :/tmp/tracelearn/workspaces
    cleanup-cron: "0 0 */6 * * *"   # Every 6 hours
    max-age-hours: 24

  sandbox:
    base-url: ${SANDBOX_URL:http://localhost:8000}
    execute-endpoint: /sandbox/execute
    default-timeout: 10
    connect-timeout-ms: 5000
    read-timeout-ms: 30000

  ai-agent:
    base-url: ${AI_AGENT_URL:http://localhost:8081}
    analyze-endpoint: /ai/analyze
    chat-endpoint: /ai/chat
    artifacts-endpoint: /ai/artifacts
    roadmap-endpoint: /ai/roadmap
    connect-timeout-ms: 5000
    read-timeout-ms: 60000

  execution:
    max-retry-count: ${MAX_RETRY_COUNT:3}
    max-file-size-bytes: 5242880    # 5 MB

  aws:
    s3:
      bucket-name: ${S3_BUCKET:tracelearn-artifacts}
      region: ${AWS_REGION:us-east-1}
      presigned-url-expiry-minutes: 60
    cloudwatch:
      log-group: ${CLOUDWATCH_LOG_GROUP:tracelearn-system-brain}

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

# ── Actuator ──
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when_authorized

# ── Logging ──
logging:
  level:
    "[ai.tracelearn]": DEBUG
    "[org.springframework.security]": INFO
    "[org.hibernate.SQL]": DEBUG
    "[org.hibernate.type.descriptor.sql.BasicBinder]": TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
