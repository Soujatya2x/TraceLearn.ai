server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: tracelearn-system-brain

  # ── Database (AWS RDS PostgreSQL) ──
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 180000
      keepalive-time: 30000
      maximum-pool-size: 5
      minimum-idle: 1
      pool-name: TraceLearnPool

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 20
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # ── Redis — distributed rate limiting (AnalyzeRateLimiter) ──
  # Shared across all backend instances so per-user limits are enforced globally.
  # REDIS_HOST / REDIS_PORT / REDIS_PASSWORD must be set in production.
  # Defaults allow local development without a Redis instance configured
  # (Spring Boot will attempt to connect; app starts but checkTokenBucket
  #  will fail on first request if Redis is unreachable).
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
          max-wait: 1000ms

  # ── Security / OAuth2 ──
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: openid, profile, email
            redirect-uri: "{baseUrl}/api/v1/auth/oauth2/callback/{registrationId}"
          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}
            scope: user:email, read:user
            redirect-uri: "{baseUrl}/api/v1/auth/oauth2/callback/{registrationId}"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
            user-name-attribute: sub
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user
            user-name-attribute: id

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# ── Application Config ──
app:
  jwt:
    # !! SECURITY: No fallback value — app will refuse to start if JWT_SECRET is not set.
    # The old fallback "super-secret-key..." was committed to git and is publicly known.
    # Any attacker with that string can forge valid JWTs for any user.
    #
    # Generate a proper secret before running:
    #   openssl rand -base64 32
    #
    # Then set it as an environment variable or in AWS Secrets Manager:
    #   JWT_SECRET=<output of above command>
    #
    # The value MUST be a Base64-encoded string of at least 32 random bytes (256 bits).
    # JwtTokenProvider decodes it with Base64.getDecoder() — non-base64 strings will
    # cause an IllegalArgumentException at startup.
    secret: ${JWT_SECRET}
    expiration-ms: 86400000          # 24 hours
    refresh-expiration-ms: 604800000 # 7 days

  workspace:
    root-path: ${WORKSPACE_ROOT}
    cleanup-cron: "0 0 */6 * * *"   # Every 6 hours
    max-age-hours: 24

  sandbox:
    base-url: ${SANDBOX_URL:http://localhost:8000}
    execute-endpoint: /sandbox/execute
    default-timeout: 10
    connect-timeout-ms: 5000
    read-timeout-ms: 30000
    # Shared secret sent as X-Internal-Secret header on every sandbox request.
    # Must match INTERNAL_SECRET env var on the sandbox service.
    # Empty fallback = auth disabled locally (sandbox logs a startup warning).
    # Generate: openssl rand -hex 32
    internal-secret: ${SANDBOX_INTERNAL_SECRET:}

  ai-agent:
    base-url: ${AI_AGENT_URL:http://localhost:8081}
    analyze-endpoint: /ai/analyze
    chat-endpoint: /ai/chat
    artifacts-endpoint: /ai/artifacts
    roadmap-endpoint: /ai/roadmap
    connect-timeout-ms: 5000
    read-timeout-ms: 60000

  execution:
    max-retry-count: ${MAX_RETRY_COUNT:3}
    max-file-size-bytes: 5242880    # 5 MB

  aws:
    s3:
      bucket-name: ${S3_BUCKET:tracelearn-artifacts}
      region: ${AWS_REGION:us-east-1}
      presigned-url-expiry-minutes: 60
    cloudwatch:
      log-group: ${CLOUDWATCH_LOG_GROUP:tracelearn-system-brain}

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

# ── Actuator ──
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when_authorized

# ── Logging ──
logging:
  level:
    "[ai.tracelearn]": DEBUG
    "[org.springframework.security]": INFO
    "[org.hibernate.SQL]": DEBUG
    "[org.hibernate.type.descriptor.sql.BasicBinder]": TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"